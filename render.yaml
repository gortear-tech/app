services:
  - type: web
    name: fbmaniaco-api
    runtime: node
    plan: starter
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm --filter @fbmaniaco/api start
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: APP_RELEASE
        sync: false
      - key: DATA_STORE_MODE
        value: supabase
      - key: ALLOW_LOCAL_DATASTORE
        value: "false"
      - key: LOCAL_AUTH_ENABLED
        value: "false"
      - key: REQUIRE_WORKER_HEARTBEAT
        value: "true"
      - key: FEATURE_META_PUBLISHING
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: SUPABASE_MEDIA_BUCKET
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_REDIRECT_URI
        sync: false
      - key: META_LOGIN_CONFIGURATION_ID
        sync: false
      - key: META_GRAPH_API_VERSION
        value: v23.0
      - key: META_REQUIRED_SCOPES
        value: pages_show_list,pages_read_engagement,pages_manage_posts
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_VISION_MODEL
        sync: false
      - key: FEATURE_OPENAI_VISION
        sync: false
      - key: FEATURE_OPENAI_IMAGE_GENERATION
        sync: false
      - key: FEATURE_REMOTE_SCHEDULE
        value: "false"
      - key: FEATURE_AUTONOMY
        value: "false"
      - key: SENTRY_DSN
        sync: false
      - key: BILLING_WEBHOOK_SECRET
        sync: false
  - type: worker
    name: fbmaniaco-worker
    runtime: node
    plan: starter
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm --filter @fbmaniaco/worker start
    envVars:
      - key: APP_ENV
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: APP_RELEASE
        sync: false
      - key: DATA_STORE_MODE
        value: supabase
      - key: ALLOW_LOCAL_DATASTORE
        value: "false"
      - key: LOCAL_AUTH_ENABLED
        value: "false"
      - key: WORKER_POLL_INTERVAL_MS
        value: "5000"
      - key: WORKER_HEARTBEAT_INTERVAL_MS
        value: "30000"
      - key: FEATURE_META_PUBLISHING
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: SUPABASE_MEDIA_BUCKET
        sync: false
      - key: META_GRAPH_API_VERSION
        value: v23.0
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_VISION_MODEL
        sync: false
      - key: FEATURE_OPENAI_VISION
        sync: false
      - key: FEATURE_OPENAI_IMAGE_GENERATION
        sync: false
      - key: FEATURE_REMOTE_SCHEDULE
        value: "false"
      - key: FEATURE_AUTONOMY
        value: "false"
      - key: SENTRY_DSN
        sync: false
